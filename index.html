<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Pace — your calm workspace</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pace" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&display=swap" rel="stylesheet">
    <script>
      // Paint the last-used theme immediately, before Dexie/React even
      // load. Dexie's settings row is only readable after an async
      // IndexedDB round-trip, so without this the page always flashes
      // light first and only *then* (if it ever finishes in time) swaps to
      // dark — reading as "it forgot my theme" on a fresh open. localStorage
      // is synchronous, so this runs before first paint.
      try {
        var t = localStorage.getItem('pace-theme');
        if (t === 'dark' || t === 'light') {
          document.documentElement.setAttribute('data-theme', t);
        }
        var d = localStorage.getItem('pace-density');
        if (d === 'compact' || d === 'comfortable') {
          document.documentElement.setAttribute('data-density', d);
        }
        var z = localStorage.getItem('pace-zoom');
        if (z && !isNaN(Number(z))) {
          document.documentElement.style.zoom = (Number(z) / 100).toString();
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
